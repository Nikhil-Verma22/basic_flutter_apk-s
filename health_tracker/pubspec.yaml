name: health
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pedometer: ^4.2.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  timeago: ^3.7.1
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
